{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-warning text-dark"><h4>Add New Book</h4></div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Book Title</label>
                        <input type="text" name="title" class="form-control" placeholder="e.g. Clean Code" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Author Name</label>
                        <input type="text" name="author" class="form-control" placeholder="e.g. Robert C. Martin" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Save to Store</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
