<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Library</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f3f4f7;
            color: #2d3436;
        }
        .navbar {
            background: rgba(255, 255, 255, 0.8) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #dee2e6;
        }
        .card {
            transition: all 0.3s ease;
        }
        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.08) !important;
        }
        .btn-primary {
            background-color: #4361ee;
            border: none;
        }
        .btn-primary:hover {
            background-color: #3f37c9;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light sticky-top mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="/">📚 E-LIBRARIAN</a>
            <div class="navbar-nav ms-auto align-items-center">
                {% if current_user.is_authenticated %}
                    <span class="badge bg-dark me-3">User: {{ current_user.username }}</span>
                    {% if current_user.role == 'admin' %}
                        <a class="nav-link fw-semibold text-warning me-3" href="/admin/add-book">+ Add Book</a>
                    {% endif %}
                    <a class="btn btn-outline-secondary btn-sm" href="/logout">Logout</a>
                {% else %}
                    <a class="nav-link" href="{{ url_for('login') }}">Login</a>
                    <a class="btn btn-primary btn-sm ms-2 px-3" href="{{ url_for('register') }}">Sign Up</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container pb-5">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
